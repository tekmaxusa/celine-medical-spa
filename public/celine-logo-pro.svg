<svg xmlns="http://www.w3.org/2000/svg" width="980" height="220" viewBox="0 0 980 220" role="img" aria-label="Celine Medical Spa">
  <!-- Transparent background by default -->
  <g fill="none" fill-rule="evenodd">
    <!-- Mark (left) -->
    <g transform="translate(26,34)">
      <circle cx="76" cy="76" r="70" stroke="#E11D48" stroke-width="4" opacity="0.9"/>
      <!-- subtle open arc to mimic provided logo -->
      <path d="M22 34a70 70 0 0 1 58-28" stroke="#E11D48" stroke-width="6" stroke-linecap="round"/>
      <path d="M130 118a70 70 0 0 1-54 28" stroke="#E11D48" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <text x="76" y="70" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Noto Sans, sans-serif" font-size="22" font-weight="700" fill="#111827" letter-spacing="3">CELINE</text>
      <text x="76" y="96" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Noto Sans, sans-serif" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="4">MEDICAL SPA</text>
    </g>

    <!-- Wordmark (right) -->
    <g transform="translate(200,62)">
      <text x="0" y="52"
        font-family="ui-serif, Georgia, Cambria, Times New Roman, Times, serif"
        font-size="60"
        font-weight="600"
        fill="#111827">Celine Medical Spa</text>
      <text x="2" y="96"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Noto Sans, sans-serif"
        font-size="28"
        font-weight="500"
        fill="#374151"
        letter-spacing="0.5">The New Standard of Self-Care</text>
    </g>
  </g>
</svg>

